name: Bug report
description: Report something that's broken or behaving unexpectedly
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please run `ytm doctor`
        and paste the output below — it includes everything I need to
        triage (version, Python, mpv, OS, recent log, recent crash).

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Clear, concise description of the bug.
      placeholder: When I do X, Y happens instead of Z.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the bug.
      placeholder: |
        1. Launch ytm
        2. Press 'g l' to go to library
        3. ...
    validations:
      required: true

  - type: textarea
    id: doctor
    attributes:
      label: ytm doctor output
      description: Run `ytm doctor` in your terminal and paste the full output here.
      render: shell
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Screenshots, terminal output, related issues.
