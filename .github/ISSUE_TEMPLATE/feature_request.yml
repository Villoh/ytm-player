name: Feature request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Got an idea? Great. **Please bundle related ideas into a single
        issue** — a list of 5 small wishes is easier to triage than 5
        separate issues filed in one day.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the use case, not the solution.
      placeholder: When I'm doing X, I want Y because Z.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution (optional)
      description: How would you like this to work? (Skip if you don't have one.)

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered (optional)

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
