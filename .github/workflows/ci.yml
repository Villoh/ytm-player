name: CI

on:
  push:
    branches: [master, dev]
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install ruff==0.15.1
      - run: ruff check src/ tests/
      - run: ruff format --check src/ tests/

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    # macOS/Windows runners can't always discover libmpv via ctypes even with
    # mpv installed via brew/choco. Tests mock mpv at the Player layer, but
    # `import mpv` happens at module-load time and fails before mocks land.
    # Tracked as a v1.6.x follow-up. Until then, only Linux is gating.
    continue-on-error: ${{ matrix.os != 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install mpv (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y mpv libmpv-dev
      - name: Install mpv (macOS)
        if: runner.os == 'macOS'
        run: brew install mpv
      - name: Install mpv (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install mpv -y
          # libmpv-2.dll is included via the dev build; tests mock mpv anyway
        shell: pwsh
      - run: pip install -e ".[dev]"
      - run: pytest --cov=ytm_player --cov-report=term-missing
