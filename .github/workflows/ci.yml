name: CI

on:
  push:
    branches: [master, dev]
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install ruff==0.15.1
      - run: ruff check src/ tests/
      - run: ruff format --check src/ tests/

  test:
    # Multi-OS matrix is pending — libmpv discovery on macOS/Windows runners
    # is unreliable (see issue #61). Until that's fixed, CI runs Linux only.
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: sudo apt-get update && sudo apt-get install -y mpv libmpv-dev
      - run: pip install -e ".[dev]"
      - run: pytest --cov=ytm_player --cov-report=term-missing
