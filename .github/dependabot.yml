version: 2
updates:
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
    groups:
      python-deps-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      python-deps-major:
        patterns:
          - "*"
        update-types:
          - "major"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - github-actions
    groups:
      gha-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      gha-major:
        patterns:
          - "*"
        update-types:
          - "major"
